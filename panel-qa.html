    --text: #1A1A18; --text-muted: #6B6B67; --text-faint: #9B9B96;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #639922;
    --red: #791F1F; --red-bg: #FCEBEB; --red-border: #E24B4A;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-border: #378ADD;
    --radius: 10px; --radius-sm: 7px;
  }
  body { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .app-header { background: #0D1B2A; padding: 1rem 1.25rem 0.875rem; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .app-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); overflow: hidden; flex-shrink: 0; }
  .app-icon img { width: 100%; height: 100%; object-fit: cover; }
  .app-header h1 { font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
  .app-header p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 1px; }
  .header-right { margin-left: auto; flex-shrink: 0; }
  .signin-btn { padding: 7px 14px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); color: #fff; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .signed-in-pill { padding: 7px 14px; border-radius: 50px; border: 1px solid var(--green-border); background: var(--green-bg); color: var(--green); font-size: 12px; font-weight: 500; display: none; align-items: center; gap: 6px; cursor: pointer; }
  .signed-in-pill.show { display: flex; }
  main { padding: 1rem; max-width: 540px; margin: 0 auto; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; margin-bottom: 0.875rem; }
  .card-title { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; }
  .field-group { margin-bottom: 0.875rem; }
  .field-group:last-child { margin-bottom: 0; }
  label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
  input[type="text"] { width: 100%; padding: 9px 11px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 15px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus { border-color: var(--blue-border); background: #fff; }
  textarea { width: 100%; padding: 9px 11px; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); outline: none; resize: none; height: 72px; transition: border-color 0.15s; }
  textarea:focus { border-color: var(--blue-border); background: #fff; }
  .pf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pf-btn { padding: 13px 0; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--bg); font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.12s; color: var(--text-muted); }
  .pf-btn:active { transform: scale(0.97); }
  .pf-btn.selected-pass { background: var(--green-bg); border-color: var(--green-border); color: var(--green); box-shadow: 0 0 0 3px rgba(99,153,34,0.15); }
  .pf-btn.selected-fail { background: var(--red-bg); border-color: var(--red-border); color: var(--red); box-shadow: 0 0 0 3px rgba(226,75,74,0.15); }
  .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .photo-slot { aspect-ratio: 4/3; border: 1.5px dashed var(--border-strong); border-radius: var(--radius-sm); background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; cursor: pointer; position: relative; overflow: hidden; }
  .photo-slot:active { opacity: 0.8; }
  .photo-slot .slot-icon { font-size: 26px; }
  .photo-slot .slot-label { font-size: 11px; color: var(--text-faint); }
  .photo-slot img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .photo-slot .remove-btn { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; background: rgba(0,0,0,0.55); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #fff; cursor: pointer; z-index: 2; }
  .photo-slot.has-photo { border-style: solid; border-color: var(--border); }
  input[type="file"] { display: none; }
  .timestamp { font-size: 12px; color: var(--text-faint); text-align: center; margin-bottom: 0.875rem; }
  .progress { display: none; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; margin-bottom: 0.875rem; }
  .progress.show { display: block; }
  .progress-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
  .progress-bar-wrap { background: var(--bg); border-radius: 50px; height: 6px; overflow: hidden; }
  .progress-bar { height: 6px; background: var(--blue-border); border-radius: 50px; width: 0%; transition: width 0.4s; }
  .success-banner { background: var(--green-bg); border: 0.5px solid var(--green-border); border-radius: var(--radius); padding: 1rem; margin-bottom: 0.875rem; display: none; }
  .success-banner.show { display: block; }
  .success-banner p { font-size: 14px; color: var(--green); font-weight: 600; }
  .success-banner small { font-size: 12px; color: var(--green); opacity: 0.8; display: block; margin-top: 3px; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.5rem; }
  .btn { padding: 13px 0; border-radius: var(--radius); font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.12s; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #0D1B2A; border-color: #0D1B2A; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .new-btn { width: 100%; padding: 11px; margin-bottom: 1.5rem; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); font-size: 14px; font-family: inherit; color: var(--text-muted); cursor: pointer; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--text); color: #fff; padding: 11px 20px; border-radius: 50px; font-size: 14px; font-weight: 500; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 100; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
  .toast.success { background: var(--green); }
</style>
</head>

<main>
  <div class="card">
    <div class="card-title">Job details</div>
    <div class="field-group">
      <label>Company</label>
      <div class="pf-row">
        <button class="pf-btn" id="btn-spl" onclick="setCompany('SPL')">SPL</button>
        <button class="pf-btn" id="btn-acmf" onclick="setCompany('ACMF')">ACMF</button>
      </div>
    </div>
    <div class="field-group"><label>Job name / address</label><input type="text" id="job-name" placeholder="e.g. 1 Cook Street" autocomplete="off"></div>
    <div class="field-group"><label>Batch #</label><input type="text" id="batch-num" placeholder="e.g. BATCH-007" autocomplete="off"></div>
    <div class="field-group"><label>Panel ID / serial number</label><input type="text" id="panel-id" placeholder="e.g. PNL-2024-0042" autocomplete="off"></div>
  </div>
  <div class="card">
    <div class="card-title">Inspection result</div>
    <div class="pf-row">
      <button class="pf-btn" id="btn-pass" onclick="setResult('pass')">✅ Pass</button>
      <button class="pf-btn" id="btn-fail" onclick="setResult('fail')">❌ Fail</button>
    </div>
    <div class="field-group" style="margin-top:0.875rem;"><label>Notes</label><textarea id="notes" placeholder="Defects, comments, or anything worth noting…"></textarea></div>
  </div>
  <div class="card">
    <div class="card-title">Photos (up to 4)</div>
    <div class="photo-grid">
      <div class="photo-slot" id="slot-0" onclick="triggerCamera(0)"><span class="slot-icon">📷</span><span class="slot-label">Tap to add photo</span></div>
      <div class="photo-slot" id="slot-1" onclick="triggerCamera(1)"><span class="slot-icon">📷</span><span class="slot-label">Tap to add photo</span></div>
      <div class="photo-slot" id="slot-2" onclick="triggerCamera(2)"><span class="slot-icon">📷</span><span class="slot-label">Tap to add photo</span></div>
      <div class="photo-slot" id="slot-3" onclick="triggerCamera(3)"><span class="slot-icon">📷</span><span class="slot-label">Tap to add photo</span></div>
    </div>
    <input type="file" accept="image/*" id="cam-0" onchange="handlePhoto(event,0)">
    <input type="file" accept="image/*" id="cam-1" onchange="handlePhoto(event,1)">
    <input type="file" accept="image/*" id="cam-2" onchange="handlePhoto(event,2)">
    <input type="file" accept="image/*" id="cam-3" onchange="handlePhoto(event,3)">
  </div>
  <p class="timestamp" id="ts"></p>
  <div class="progress" id="progress">
    <div class="progress-label" id="progress-label">Uploading…</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
  <div class="success-banner" id="success-banner">
    <p>✅ Saved to OneDrive!</p>
    <small id="success-path"></small>
  </div>

    <button class="btn" onclick="savePDFLocal()">📄 Save PDF</button>
    <button class="btn btn-primary" id="od-btn" onclick="saveToOneDrive()">☁️ Save to OneDrive</button>
  </div>
  <button class="new-btn" onclick="newInspection()">+ Next panel (keeps job &amp; batch)</button>
</main>

async function initMSAL() {
  if (msalInstance) return;

  await msalInstance.initialize();
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length) { currentAccount = accounts[0]; updateSignedIn(currentAccount.name || currentAccount.username); }
}

async function signIn() {
  await initMSAL();
  try {
    const res = await msalInstance.loginPopup({ scopes: SCOPES });
    currentAccount = res.account;
    updateSignedIn(res.account.name || res.account.username);
    toast('Signed in ✓', 'success');
  } catch(e) { if (!e.message.includes('cancelled')) toast('Sign-in failed', 'error'); }
}

function signOut() {
  if (!confirm('Sign out?')) return;
  if (msalInstance && currentAccount) msalInstance.logoutPopup({ account: currentAccount }).catch(()=>{});
  currentAccount = null;
  document.getElementById('signin-btn').style.display = '';
  document.getElementById('signed-in-pill').classList.remove('show');
}

function updateSignedIn(name) {
  document.getElementById('signin-btn').style.display = 'none';
  document.getElementById('signed-in-pill').classList.add('show');
  const short = name.includes('@') ? name.split('@')[0] : name.split(' ')[0];
  document.getElementById('user-name').textContent = short;
}

async function getToken() {
  await initMSAL();
  if (!currentAccount) { await signIn(); if (!currentAccount) return null; }
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: currentAccount });
    return res.accessToken;
  } catch(e) {
    const res = await msalInstance.acquireTokenPopup({ scopes: SCOPES, account: currentAccount });
    return res.accessToken;
  }
}

function updateTimestamp() {
  const now = new Date();
  document.getElementById('ts').textContent = 'Inspection time: ' +
    now.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short',year:'numeric'}) +
    ' at ' + now.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
}
updateTimestamp(); setInterval(updateTimestamp, 30000);

function setCompany(val) {
  company = val;
  document.getElementById('btn-spl').className = 'pf-btn'+(val==='SPL'?' selected-pass':'');
  document.getElementById('btn-acmf').className = 'pf-btn'+(val==='ACMF'?' selected-pass':'');
}

function setResult(val) {
  inspectionResult = val;
  document.getElementById('btn-pass').className = 'pf-btn'+(val==='pass'?' selected-pass':'');
  document.getElementById('btn-fail').className = 'pf-btn'+(val==='fail'?' selected-fail':'');
}

function triggerCamera(idx) { document.getElementById('cam-'+idx).click(); }
function handlePhoto(e,idx) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => { photos[idx]=ev.target.result; renderSlot(idx); };
  reader.readAsDataURL(file);
}
function renderSlot(idx) {
  const slot = document.getElementById('slot-'+idx);
  if (photos[idx]) {
    slot.classList.add('has-photo');
    slot.innerHTML = '<img src="'+photos[idx]+'" alt="Photo '+(idx+1)+'"><div class="remove-btn" onclick="removePhoto(event,'+idx+')">✕</div>';
  } else {
    slot.classList.remove('has-photo');
    slot.innerHTML = '<span class="slot-icon">📷</span><span class="slot-label">Tap to add photo</span>';
    slot.onclick = () => triggerCamera(idx);
  }
}
function removePhoto(e,idx) {
  e.stopPropagation(); photos[idx]=null;
  document.getElementById('cam-'+idx).value=''; renderSlot(idx);
}

function getFields() {
  return {
    job: document.getElementById('job-name').value.trim(),
    batch: document.getElementById('batch-num').value.trim(),
    panel: document.getElementById('panel-id').value.trim(),
    notes: document.getElementById('notes').value.trim(),
    time: document.getElementById('ts').textContent.replace('Inspection time: ','')
  };
}
function validate() {
  const f = getFields();
  if (!company)          { toast('Select SPL or ACMF','error'); return null; }
  if (!f.job)            { toast('Enter a job name','error'); return null; }
  if (!f.batch)          { toast('Enter a batch number','error'); return null; }
  if (!f.panel)          { toast('Enter a panel ID','error'); return null; }
  if (!inspectionResult) { toast('Select Pass or Fail','error'); return null; }
  return f;
}

async function buildPDF(f) {
  const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210, margin=18;
  const passColor = inspectionResult==='pass'?[59,109,17]:[121,31,31];
  const passBg    = inspectionResult==='pass'?[234,243,222]:[252,235,235];
  doc.setFillColor(13,27,42); doc.rect(0,0,W,24,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('Panel QA Report', margin, 15.5);
  doc.setFillColor(...passBg); doc.roundedRect(W-52,6,35,12,3,3,'F');
  doc.setTextColor(...passColor); doc.setFontSize(11);
  doc.text(inspectionResult.toUpperCase(), W-34.5, 14, {align:'center'});
  let y=34;
  function sectionHead(title) {
    doc.setFillColor(245,245,243); doc.rect(margin,y-1,W-margin*2,8,'F');
    doc.setTextColor(100,100,96); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text(title.toUpperCase(),margin+2,y+4.5); y+=10;
  }
  function row(label,value) {
    doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(107,107,103);
    doc.text(label,margin,y+4); doc.setTextColor(26,26,24); doc.setFont('helvetica','bold');
    doc.text(value||'—',margin+45,y+4); y+=7;
  }
  sectionHead('Job details');
  row('Job / Address',f.job); row('Batch #',f.batch); row('Panel ID',f.panel);
  row('Result',inspectionResult.toUpperCase()); row('Timestamp',f.time);
  if (f.notes) {
    row('Notes',''); y-=7;
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(26,26,24);
    const lines=doc.splitTextToSize(f.notes,W-margin*2-45);
    doc.text(lines,margin+45,y+4); y+=lines.length*5+2;
  }
  y+=6;
  const hasPhotos=photos.filter(Boolean);
  if (hasPhotos.length) {
    sectionHead('Photos ('+hasPhotos.length+')'); y+=2;
    const imgW=(W-margin*2-8)/2, imgH=imgW*0.75; let col=0;
    for (const src of hasPhotos) {
      const x=margin+col*(imgW+8);
      if(y+imgH>280){doc.addPage();y=18;}
      try{doc.addImage(src,'JPEG',x,y,imgW,imgH,'','MEDIUM');}catch(e){}
      doc.setDrawColor(200,200,200); doc.setLineWidth(0.3); doc.rect(x,y,imgW,imgH);
      col++; if(col===2){col=0;y+=imgH+6;}
    }
    if(col===1) y+=imgH+6;
  }
  doc.setFontSize(8); doc.setTextColor(160,160,155);
  doc.text('Symonite Panels Ltd — Panel QA',margin,290);
  doc.text('Page 1',W-margin,290,{align:'right'});
  return doc;
}

function safe(s){return s.replace(/[^a-z0-9-_. ]/gi,'_').trim();}

async function savePDFLocal() {
  const f=validate(); if(!f) return;
  toast('Generating PDF…');
  const doc=await buildPDF(f);
  doc.save(safe(f.job+'-'+f.batch+'-'+f.panel)+'-QA.pdf');
  toast('PDF saved!','success');
}

function setProgress(label,pct) {
  const el=document.getElementById('progress');
  if(pct===null){el.classList.remove('show');return;}
  el.classList.add('show');
  document.getElementById('progress-label').textContent=label;
  document.getElementById('progress-bar').style.width=pct+'%';
}

async function uploadFile(token,path,blob,contentType) {
  const url='https://graph.microsoft.com/v1.0/sites/symonitenz.sharepoint.com:/sites/QualityAssurance:/drives';
  // Get the drive ID first time
  if (!window._driveId) {
    const dr = await fetch(url, {headers:{Authorization:'Bearer '+token}});
    const ddata = await dr.json();
    window._driveId = ddata.value[0].id;
  }
  const uploadUrl='https://graph.microsoft.com/v1.0/drives/'+window._driveId+'/root:'+encodeURI('/QA'+path)+':/content';
  const res=await fetch(uploadUrl,{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':contentType},body:blob});
  if(!res.ok){const t=await res.text();throw new Error('Upload failed ('+res.status+'): '+t);}
  return res.json();
}

async function saveToOneDrive() {
  const f=validate(); if(!f) return;
  const token=await getToken(); if(!token) return;
  document.getElementById('success-banner').classList.remove('show');
  setProgress('Generating PDF…',10);
  let doc;
  try{doc=await buildPDF(f);}catch(e){setProgress(null);toast('PDF error','error');return;}
  const folderPath = '/'+company+'/'+f.job;
  const baseName = safe(f.job+'-'+f.batch+'-'+f.panel);
  setProgress('Uploading PDF…',35);
  try {
    await uploadFile(token, folderPath+'/'+baseName+'-QA.pdf', doc.output('blob'), 'application/pdf');
  } catch(e) {
    setProgress(null);
    toast('Upload failed — check connection','error');
    console.error(e); return;
  }
  const photoList=photos.map((p,i)=>p?{data:p,idx:i}:null).filter(Boolean);
  for(let i=0;i<photoList.length;i++){
    const pct=35+Math.round(((i+1)/Math.max(photoList.length,1))*55);
    setProgress('Uploading photo '+(i+1)+' of '+photoList.length+'…',pct);
    try{
      const r=await fetch(photoList[i].data);
      const blob=await r.blob();
      await uploadFile(token,folderPath+'/'+baseName+'-photo'+(photoList[i].idx+1)+'.jpg',blob,'image/jpeg');
    }catch(e){console.warn('Photo upload failed',e);}
  }
  setProgress('Done!',100);
  setTimeout(()=>setProgress(null),1200);
  document.getElementById('success-banner').classList.add('show');
  document.getElementById('success-path').textContent='Saved to: QA / '+company+' / '+f.job;
  toast('Saved to OneDrive ✓','success');
}

function newInspection() {
  inspectionResult=null; company=null;
  ['btn-pass','btn-fail','btn-spl','btn-acmf'].forEach(id=>document.getElementById(id).className='pf-btn');
  document.getElementById('panel-id').value='';
  document.getElementById('notes').value='';
  photos.forEach((_,i)=>{photos[i]=null;document.getElementById('cam-'+i).value='';renderSlot(i);});
  document.getElementById('success-banner').classList.remove('show');
  updateTimestamp();
  toast('Ready for next panel');
}

let toastTimer;
function toast(msg,type){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='toast',3200);
}

initMSAL();
</script>
